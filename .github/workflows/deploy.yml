name: CI/CD Pipeline

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    name: Build and Audit
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          # This handles caching automatically so 'npm install' is faster
          cache: 'npm'

      - name: Install Dependencies
        run: |
          if [ -f package-lock.json ]; then
            npm ci
          else
            npm install
          fi

      - name: Security Audit
        # This checks for known vulnerabilities in your packages
        # '|| true' ensures the build doesn't fail just for minor warnings
        run: npm audit --audit-level=high || true

      - name: Build Project
        run: npm run build --if-present

      - name: Upload Build Artifact
        # This saves your build folder so you can deploy it in the next step
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: actions/upload-artifact@v4
        with:
          name: production-build
          path: ./dist # Change this to 'build' or 'out' depending on your framework
          retention-days: 1

  # This job only runs if the Build job passes and you are on the main branch
  deploy:
    name: Deploy Application
    needs: build
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - name: Download Build Artifact
        uses: actions/download-artifact@v4
        with:
          name: production-build

      - name: Deploying...
        run: echo "Insert your deployment command here (e.g., firebase deploy, pm2 restart, etc.)"
