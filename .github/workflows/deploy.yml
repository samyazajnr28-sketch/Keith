name: build-and-deploy

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          # We remove 'cache' and 'cache-dependency-path' to avoid the 
          # "lock file not found" error if they don't exist yet.

      - name: Install Dependencies
        run: |
          if [ -f package-lock.json ]; then
            npm ci
          else
            npm install
          fi

      - name: Build Project
        run: npm run build --if-present

      - name: Test Project
        run: npm test --if-present
        
      # Add your specific deployment steps below (e.g., to Heroku, Vercel, or Docker)


